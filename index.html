<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Live Weather Map</title>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://esm.sh/leaflet@1.9.4/dist/leaflet.css" />

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@19.2.0",
        "react-dom/client": "https://esm.sh/react-dom@19.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@19.2.0/jsx-runtime",
        "lucide-react": "https://esm.sh/lucide-react",
        "@brrock/shad-pkged": "https://esm.sh/@brrock/shad-pkged@0.0.6?external=react,react-dom",
        "leaflet": "https://esm.sh/leaflet@1.9.4"
      }
    }
  </script>

  <style>
    body { margin: 0; font-family: system-ui; }
    #map { height: 100vh; width: 100%; }
    .radar-controls {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      background: rgba(0,0,0,0.2);
      backdrop-filter: blur(5px);
    }
    .radar-slider {
      width: 100%;
    }
    .radar-buttons {
      display: flex;
      gap: 4px;
      justify-content: flex-start;
    }
    .card-transparent {
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(6px);
      color: white;
    }
    .btn-transparent {
      background: rgba(0,0,0,0.3);
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="module">
    import React, { useEffect, useRef, useState } from "react"
    import { createRoot } from "react-dom/client"
    import L from "leaflet"
    import { CloudRain, Sun, Wind, MapPin, Crosshair, AlertCircle, Play, Pause } from "lucide-react"
    import { Button, Card, CardContent, CardDescription, CardHeader, CardTitle } from "@brrock/shad-pkged"

    function App() {
      const mapRef = useRef(null)
      const mapInstance = useRef(null)
      const radarLayer = useRef(null)
      const userMarker = useRef(null)
      const markersRef = useRef([])
      const radarAnimationRef = useRef(null)

      const [weather, setWeather] = useState(null)
      const [cursorMode, setCursorMode] = useState(true)
      const [isLoadingLocation, setIsLoadingLocation] = useState(false)
      const [locationError, setLocationError] = useState(null)
      const [radarEnabled, setRadarEnabled] = useState(true)
      const [radarAnimating, setRadarAnimating] = useState(false)
      const [radarFrame, setRadarFrame] = useState(0)
      const [radarTimestamps, setRadarTimestamps] = useState([])
      const [radarMode, setRadarMode] = useState("live") // live or play

      useEffect(() => {
        if (!mapInstance.current) {
          mapInstance.current = L.map(mapRef.current).setView([51.505, -0.09], 6)

          L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
            attribution: "&copy; OpenStreetMap contributors"
          }).addTo(mapInstance.current)

          radarLayer.current = L.tileLayer(
            "https://tilecache.rainviewer.com/v2/radar/latest/256/{z}/{x}/{y}/2/1_1.png",
            { opacity: 0.6 }
          ).addTo(mapInstance.current)

          mapInstance.current.on("click", (e) => {
            if (cursorMode) addMarker(e.latlng.lat, e.latlng.lng)
          })
        }
      }, [cursorMode])

      useEffect(() => {
        if (radarLayer.current) {
          if (radarEnabled) {
            mapInstance.current.addLayer(radarLayer.current)
          } else {
            mapInstance.current.removeLayer(radarLayer.current)
          }
        }
      }, [radarEnabled])

      function playRadar() {
        if (radarAnimating) return
        const now = Math.floor(Date.now() / 1000)
        const timestamps = []
        for (let i = 30; i >= 0; i -= 5) timestamps.push(now - i*60)
        setRadarTimestamps(timestamps)
        setRadarFrame(0)
        setRadarAnimating(true)
        setRadarMode("play")
      }

      function showLiveRadar() {
        setRadarMode("live")
        setRadarAnimating(false)
        radarLayer.current.setUrl("https://tilecache.rainviewer.com/v2/radar/latest/256/{z}/{x}/{y}/2/1_1.png")
      }

      useEffect(() => {
        if (radarAnimating && radarTimestamps.length > 0) {
          if (radarFrame >= radarTimestamps.length) {
            setRadarFrame(0)
          } else {
            const url = `https://tilecache.rainviewer.com/v2/radar/${radarTimestamps[radarFrame]}/256/{z}/{x}/{y}/2/1_1.png`
            radarLayer.current.setUrl(url)
            radarAnimationRef.current = setTimeout(() => setRadarFrame(radarFrame + 1), 500)
          }
        } else {
          clearTimeout(radarAnimationRef.current)
        }
      }, [radarFrame, radarAnimating, radarTimestamps])

      async function addMarker(lat, lng) {
        try {
          const marker = L.marker([lat, lng]).addTo(mapInstance.current)
          markersRef.current.push(marker)
          const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current_weather=true`)
          if (!res.ok) throw new Error("Failed to fetch weather")
          const data = await res.json()
          const current = data.current_weather
          setWeather({
            temp: current.temperature,
            wind: current.windspeed,
            rain: current.weathercode >= 51,
            lat: lat.toFixed(4),
            lng: lng.toFixed(4)
          })
          marker.bindPopup(`<b>${current.temperature}°C</b><br/>Wind: ${current.windspeed} km/h`).openPopup()
        } catch (err) {
          setLocationError("Failed to fetch weather data")
          console.error(err)
        }
      }

      function clearMarkers() {
        markersRef.current.forEach(m => mapInstance.current.removeLayer(m))
        markersRef.current = []
      }

      function showMyLocation() {
        setIsLoadingLocation(true)
        setLocationError(null)
        if (!navigator.geolocation) {
          setLocationError("Geolocation not supported")
          setIsLoadingLocation(false)
          return
        }
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            const { latitude, longitude } = pos.coords
            if (!userMarker.current) {
              userMarker.current = L.marker([latitude, longitude], {
                icon: L.icon({
                  iconUrl: "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png",
                  iconSize: [25, 41],
                  iconAnchor: [12, 41]
                })
              }).addTo(mapInstance.current).bindPopup("<b>Your Location</b>")
            } else userMarker.current.setLatLng([latitude, longitude])
            mapInstance.current.setView([latitude, longitude], 10)
            addMarker(latitude, longitude)
            setIsLoadingLocation(false)
          },
          (err) => {
            setLocationError("Failed to get location")
            setIsLoadingLocation(false)
          }
        )
      }

      return React.createElement(React.Fragment, null,
        React.createElement("div", { style: { position: "absolute", top: "20px", left: "20px", zIndex: 1000, width: "320px" } },
          React.createElement(Card, { className: "w-full card-transparent" },
            React.createElement(CardHeader, null,
              React.createElement(CardTitle, null, "Weather Explorer"),
              React.createElement(CardDescription, null, "Click on map or use your location")
            ),
            React.createElement(CardContent, { className: "space-y-3" },
              React.createElement(Button, { onClick: () => setCursorMode(!cursorMode), variant: "outline", className: "w-full btn-transparent" },
                React.createElement(Crosshair, { className: "h-4 w-4 mr-2" }),
                cursorMode ? "Cursor Marker: ON" : "Cursor Marker: OFF"
              ),
              React.createElement(Button, { onClick: showMyLocation, disabled: isLoadingLocation, variant: "outline", className: "w-full btn-transparent" },
                React.createElement(MapPin, { className: "h-4 w-4 mr-2" }),
                isLoadingLocation ? "Getting location..." : "Show My Location"
              ),
              React.createElement(Button, { onClick: clearMarkers, variant: "destructive", className: "w-full text-xs btn-transparent" }, "Clear Markers"),
              React.createElement(Button, { onClick: () => setRadarEnabled(!radarEnabled), variant: radarEnabled ? "default" : "outline", className: "w-full text-xs btn-transparent" },
                radarEnabled ? "Radar: ON" : "Radar: OFF"
              ),
              React.createElement(Button, { onClick: radarMode === "live" ? playRadar : showLiveRadar, variant: "outline", className: "w-full btn-transparent" },
                radarMode === "live" ? "Play Radar Animation" : "Live Radar"
              ),
              locationError && React.createElement("div", { className: "flex items-center gap-2 p-2 bg-destructive/10 text-destructive text-sm rounded" },
                React.createElement(AlertCircle, { className: "h-4 w-4 flex-shrink-0" }),
                React.createElement("span", null, locationError)
              ),
              weather && React.createElement("div", { className: "space-y-2 pt-2 border-t" },
                React.createElement("div", { className: "flex items-center gap-2" },
                  weather.rain
                    ? React.createElement(CloudRain, { className: "h-5 w-5 text-blue-500" })
                    : React.createElement(Sun, { className: "h-5 w-5 text-yellow-500" }),
                  React.createElement("span", { className: "text-sm" }, weather.rain ? "Raining" : "Clear")
                ),
                React.createElement("div", { className: "flex items-center gap-2" },
                  React.createElement(Wind, { className: "h-5 w-5 text-slate-500" }),
                  React.createElement("span", { className: "text-sm" }, `Wind: ${weather.wind} km/h`)
                ),
                React.createElement("div", { className: "flex items-center gap-2" },
                  React.createElement(Sun, { className: "h-5 w-5 text-orange-500" }),
                  React.createElement("span", { className: "text-sm font-semibold" }, `${weather.temp}°C`)
                ),
                React.createElement("div", { className: "text-xs text-muted-foreground pt-1" }, `Location: ${weather.lat}, ${weather.lng}`)
              )
            )
          )
        ),
        React.createElement("div", { id: "map", ref: mapRef }),
        React.createElement("div", { className: "radar-controls" },
          React.createElement("input", { type: "range", min: 0, max: radarTimestamps.length-1, value: radarFrame, onChange: (e)=>setRadarFrame(Number(e.target.value)), className: "radar-slider" }),
          React.createElement("div", { className: "radar-buttons" },
            React.createElement(Button, { onClick: () => setRadarAnimating(true), variant: "outline", className: "text-xs btn-transparent" },
              React.createElement(Play, { className: "h-4 w-4 mr-1" }), "Play"
            ),
            React.createElement(Button, { onClick: () => setRadarAnimating(false), variant: "outline", className: "text-xs btn-transparent" },
              React.createElement(Pause, { className: "h-4 w-4 mr-1" }), "Pause"
            )
          )
        )
      )
    }

    createRoot(document.getElementById("root")).render(
      React.createElement(App)
    )
  </script>
</body>
</html>
