<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Live Weather Map</title>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <link
    rel="stylesheet"
    href="https://esm.sh/leaflet@1.9.4/dist/leaflet.css"
  />

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@19.2.0",
        "react-dom/client": "https://esm.sh/react-dom@19.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@19.2.0/jsx-runtime",
        "lucide-react": "https://esm.sh/lucide-react",
        "@brrock/shad-pkged": "https://esm.sh/@brrock/shad-pkged@0.0.6?external=react,react-dom"
      }
    }
  </script>

  <style>
    body { margin: 0; font-family: system-ui; }
    #map { height: 100vh; width: 100%; }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="module">
    import React, { useEffect, useRef, useState } from "react"
    import { createRoot } from "react-dom/client"
    import L from "https://esm.sh/leaflet@1.9.4"
    import { CloudRain, Sun, Wind, MapPin, Crosshair, AlertCircle, CheckCircle2 } from "lucide-react"
    import {
      Button,
      Card,
      CardContent,
      CardDescription,
      CardHeader,
      CardTitle,
    } from "@brrock/shad-pkged"

    function App() {
      const mapRef = useRef(null)
      const mapInstance = useRef(null)
      const radarLayer = useRef(null)
      const userMarker = useRef(null)
      const markersRef = useRef([])
      const radarAnimationRef = useRef(null)

      const [weather, setWeather] = useState(null)
      const [cursorMode, setCursorMode] = useState(true)
      const [isLoadingLocation, setIsLoadingLocation] = useState(false)
      const [locationError, setLocationError] = useState(null)
      const [lastLocation, setLastLocation] = useState(null)
      const [radarEnabled, setRadarEnabled] = useState(true)
      const [radarAnimating, setRadarAnimating] = useState(false)

      useEffect(() => {
        if (!mapInstance.current) {
          mapInstance.current = L.map(mapRef.current).setView([51.505, -0.09], 6)

          L.tileLayer(
            "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
            { attribution: "&copy; OpenStreetMap contributors" }
          ).addTo(mapInstance.current)

          radarLayer.current = L.tileLayer(
            "https://tilecache.rainviewer.com/v2/radar/latest/256/{z}/{x}/{y}/2/1_1.png",
            { opacity: 0.6 }
          ).addTo(mapInstance.current)

          mapInstance.current.on("click", (e) => {
            if (cursorMode) {
              addMarker(e.latlng.lat, e.latlng.lng)
            }
          })
        }
      }, [cursorMode])

      useEffect(() => {
        if (radarLayer.current) {
          if (radarEnabled) {
            mapInstance.current.addLayer(radarLayer.current)
          } else {
            mapInstance.current.removeLayer(radarLayer.current)
          }
        }
      }, [radarEnabled])

      function playRadarAnimation() {
        setRadarAnimating(true)
        const now = Math.floor(Date.now() / 1000)
        const timestamps = []
        
        // Generate timestamps for the last 30 minutes (6 frames, 5 minutes apart)
        for (let i = 30; i >= 0; i -= 5) {
          timestamps.push(now - (i * 60))
        }

        let currentFrame = 0
        const animateRadar = () => {
          const timestamp = timestamps[currentFrame % timestamps.length]
          const url = `https://tilecache.rainviewer.com/v2/radar/${timestamp}/256/{z}/{x}/{y}/2/1_1.png`

          if (radarLayer.current) {
            radarLayer.current.setUrl(url)
          }

          currentFrame++

          if (currentFrame < timestamps.length * 3) {
            radarAnimationRef.current = setTimeout(animateRadar, 500)
          } else {
            radarLayer.current.setUrl("https://tilecache.rainviewer.com/v2/radar/latest/256/{z}/{x}/{y}/2/1_1.png")
            setRadarAnimating(false)
          }
        }

        animateRadar()
      }

      function clearMarkers() {
        markersRef.current.forEach(marker => {
          mapInstance.current.removeLayer(marker)
        })
        markersRef.current = []
      }

      async function addMarker(lat, lng) {
        try {
          const marker = L.marker([lat, lng]).addTo(mapInstance.current)
          markersRef.current.push(marker)

          const res = await fetch(
            `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current_weather=true`
          )
          
          if (!res.ok) throw new Error("Failed to fetch weather")
          
          const data = await res.json()

          const current = data.current_weather
          setWeather({
            temp: current.temperature,
            wind: current.windspeed,
            rain: current.weathercode >= 51,
            lat: lat.toFixed(4),
            lng: lng.toFixed(4)
          })
          setLastLocation({ lat, lng })
          setLocationError(null)

          marker.bindPopup(`
            <b>${current.temperature}°C</b><br/>
            Wind: ${current.windspeed} km/h
          `).openPopup()
        } catch (error) {
          setLocationError("Failed to fetch weather data. Try again.")
          console.error(error)
        }
      }

      function showMyLocation() {
        setIsLoadingLocation(true)
        setLocationError(null)

        if (!navigator.geolocation) {
          setLocationError("Geolocation is not supported by your browser")
          setIsLoadingLocation(false)
          return
        }

        navigator.geolocation.getCurrentPosition(
          (position) => {
            const { latitude, longitude } = position.coords

            if (userMarker.current) {
              userMarker.current.setLatLng([latitude, longitude])
            } else {
              userMarker.current = L.marker([latitude, longitude], {
                title: "You are here",
                icon: L.icon({
                  iconUrl: "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png",
                  iconSize: [25, 41],
                  iconAnchor: [12, 41],
                  popupAnchor: [1, -34]
                })
              })
                .addTo(mapInstance.current)
                .bindPopup("<b>Your Location</b>")
                .openPopup()
            }

            mapInstance.current.setView([latitude, longitude], 10)
            addMarker(latitude, longitude)
            setIsLoadingLocation(false)
          },
          (err) => {
            let errorMsg = "Could not get your location"
            if (err.code === 1) errorMsg = "Permission denied. Please enable location access."
            else if (err.code === 2) errorMsg = "Position unavailable. Try again."
            else if (err.code === 3) errorMsg = "Location request timed out."
            setLocationError(errorMsg)
            setIsLoadingLocation(false)
          }
        )
      }

      return React.createElement(
        React.Fragment,
        null,

        React.createElement(
          "div",
          { style: { position: "absolute", top: "20px", left: "20px", zIndex: 1000, width: "320px" } },

          React.createElement(
            Card,
            { className: "w-full" },

            React.createElement(
              CardHeader,
              {},
              React.createElement(CardTitle, null, "Weather Explorer"),
              React.createElement(CardDescription, null, "Click on map or use your location")
            ),

            React.createElement(
              CardContent,
              { className: "space-y-3" },

              React.createElement(
                "div",
                { className: "space-y-2" },

                React.createElement(
                  Button,
                  {
                    onClick: () => setCursorMode(!cursorMode),
                    variant: cursorMode ? "default" : "outline",
                    className: "w-full"
                  },
                  React.createElement(Crosshair, { className: "h-4 w-4 mr-2" }),
                  cursorMode ? "Cursor Marker: ON" : "Cursor Marker: OFF"
                ),

                React.createElement(
                  Button,
                  {
                    onClick: showMyLocation,
                    disabled: isLoadingLocation,
                    variant: "secondary",
                    className: "w-full"
                  },
                  React.createElement(MapPin, { className: "h-4 w-4 mr-2" }),
                  isLoadingLocation ? "Getting location..." : "Show My Location"
                ),

                React.createElement(
                  Button,
                  {
                    onClick: clearMarkers,
                    variant: "destructive",
                    className: "w-full text-xs"
                  },
                  "Clear Markers"
                ),

                React.createElement(
                  Button,
                  {
                    onClick: () => setRadarEnabled(!radarEnabled),
                    variant: radarEnabled ? "default" : "outline",
                    className: "w-full text-xs"
                  },
                  radarEnabled ? "Radar: ON" : "Radar: OFF"
                ),

                React.createElement(
                  Button,
                  {
                    onClick: playRadarAnimation,
                    disabled: radarAnimating,
                    variant: "outline",
                    className: "w-full text-xs"
                  },
                  radarAnimating ? "Playing..." : "Play Radar"
                )
              ),

              locationError && React.createElement(
                "div",
                { className: "flex items-center gap-2 p-2 bg-destructive/10 text-destructive text-sm rounded" },
                React.createElement(AlertCircle, { className: "h-4 w-4 flex-shrink-0" }),
                React.createElement("span", null, locationError)
              ),

              weather && React.createElement(
                "div",
                { className: "space-y-2 pt-2 border-t" },

                React.createElement(
                  "div",
                  { className: "flex items-center gap-2" },
                  weather.rain
                    ? React.createElement(CloudRain, { className: "h-5 w-5 text-blue-500" })
                    : React.createElement(Sun, { className: "h-5 w-5 text-yellow-500" }),
                  React.createElement("span", { className: "text-sm" }, weather.rain ? "Raining" : "Clear")
                ),

                React.createElement(
                  "div",
                  { className: "flex items-center gap-2" },
                  React.createElement(Wind, { className: "h-5 w-5 text-slate-500" }),
                  React.createElement("span", { className: "text-sm" }, `Wind: ${weather.wind} km/h`)
                ),

                React.createElement(
                  "div",
                  { className: "flex items-center gap-2" },
                  React.createElement(Sun, { className: "h-5 w-5 text-orange-500" }),
                  React.createElement("span", { className: "text-sm font-semibold" }, `${weather.temp}°C`)
                ),

                React.createElement(
                  "div",
                  { className: "text-xs text-muted-foreground pt-1" },
                  `Location: ${weather.lat}, ${weather.lng}`
                )
              )
            )
          )
        ),

        React.createElement("div", { id: "map", ref: mapRef })
      )
    }

    createRoot(document.getElementById("root")).render(
      React.createElement(App)
    )
  </script>

  <style type="text/tailwindcss">
    @property --tw-animation-delay {
      syntax: "*";
      inherits: false;
      initial-value: 0s;
    }
    @property --tw-animation-direction {
      syntax: "*";
      inherits: false;
      initial-value: normal;
    }
    @property --tw-animation-duration {
      syntax: "*";
      inherits: false;
    }
    @property --tw-animation-fill-mode {
      syntax: "*";
      inherits: false;
      initial-value: none;
    }
    @property --tw-animation-iteration-count {
      syntax: "*";
      inherits: false;
      initial-value: 1;
    }
    @custom-variant dark (&:is(.dark *));

    :root {
      --background: oklch(1 0 0);
      --foreground: oklch(0.145 0 0);
      --card: oklch(1 0 0);
      --card-foreground: oklch(0.145 0 0);
      --popover: oklch(1 0 0);
      --popover-foreground: oklch(0.145 0 0);
      --primary: oklch(0.205 0 0);
      --primary-foreground: oklch(0.985 0 0);
      --secondary: oklch(0.97 0 0);
      --secondary-foreground: oklch(0.205 0 0);
      --muted: oklch(0.97 0 0);
      --muted-foreground: oklch(0.556 0 0);
      --accent: oklch(0.97 0 0);
      --accent-foreground: oklch(0.205 0 0);
      --destructive: oklch(0.577 0.245 27.325);
      --destructive-foreground: oklch(0.577 0.245 27.325);
      --border: oklch(0.922 0 0);
      --input: oklch(0.922 0 0);
      --ring: oklch(0.708 0 0);
      --radius: 0.625rem;
    }

    .dark {
      --background: oklch(0.145 0 0);
      --foreground: oklch(0.985 0 0);
      --card: oklch(0.145 0 0);
      --card-foreground: oklch(0.985 0 0);
      --popover: oklch(0.145 0 0);
      --popover-foreground: oklch(0.985 0 0);
      --primary: oklch(0.985 0 0);
      --primary-foreground: oklch(0.205 0 0);
      --secondary: oklch(0.269 0 0);
      --secondary-foreground: oklch(0.985 0 0);
      --muted: oklch(0.269 0 0);
      --muted-foreground: oklch(0.708 0 0);
      --accent: oklch(0.269 0 0);
      --accent-foreground: oklch(0.985 0 0);
      --destructive: oklch(0.396 0.141 25.723);
      --destructive-foreground: oklch(0.637 0.237 25.331);
      --border: oklch(0.269 0 0);
      --input: oklch(0.269 0 0);
      --ring: oklch(0.439 0 0);
    }

    @theme inline {
      --color-background: var(--background);
      --color-foreground: var(--foreground);
      --color-card: var(--card);
      --color-card-foreground: var(--card-foreground);
      --color-popover: var(--popover);
      --color-popover-foreground: var(--popover-foreground);
      --color-primary: var(--primary);
      --color-primary-foreground: var(--primary-foreground);
      --color-secondary: var(--secondary);
      --color-secondary-foreground: var(--secondary-foreground);
      --color-muted: var(--muted);
      --color-muted-foreground: var(--muted-foreground);
      --color-accent: var(--accent);
      --color-accent-foreground: var(--accent-foreground);
      --color-destructive: var(--destructive);
      --color-destructive-foreground: var(--destructive-foreground);
      --color-border: var(--border);
      --color-input: var(--input);
      --color-ring: var(--ring);
      --radius-sm: calc(var(--radius) - 4px);
      --radius-md: calc(var(--radius) - 2px);
      --radius-lg: var(--radius);
      --radius-xl: calc(var(--radius) + 4px);
    }

    @layer base {
      * {
        @apply border-border outline-ring/50;
      }
      body {
        @apply bg-background text-foreground;
      }
    }
  </style>
</body>
</html>
