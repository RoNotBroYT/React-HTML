<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Live Weather Map</title>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <link
    rel="stylesheet"
    href="https://esm.sh/leaflet@1.9.4/dist/leaflet.css"
  />

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@19.2.0",
        "react-dom/client": "https://esm.sh/react-dom@19.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@19.2.0/jsx-runtime",
        "lucide-react": "https://esm.sh/lucide-react",
        "@brrock/shad-pkged": "https://esm.sh/@brrock/shad-pkged@0.0.6?external=react,react-dom"
      }
    }
  </script>

  <style>
    body { margin: 0; font-family: system-ui; }
    #map { height: 100vh; width: 100%; }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="module">
    import React, { useEffect, useRef, useState } from "react"
    import { createRoot } from "react-dom/client"
    import L from "https://esm.sh/leaflet@1.9.4"
    import { CloudRain, Sun, Wind, MapPin, Crosshair, AlertCircle } from "lucide-react"
    import {
      Button,
      Card,
      CardContent,
      CardDescription,
      CardHeader,
      CardTitle,
    } from "@brrock/shad-pkged"

    function App() {
      const mapRef = useRef(null)
      const mapInstance = useRef(null)
      const radarLayer = useRef(null)
      const radarAnimationRef = useRef(null)
      const userMarker = useRef(null)
      const markersRef = useRef([])

      const [weather, setWeather] = useState(null)
      const [cursorMode, setCursorMode] = useState(true)
      const [isLoadingLocation, setIsLoadingLocation] = useState(false)
      const [locationError, setLocationError] = useState(null)
      const [radarEnabled, setRadarEnabled] = useState(true)
      const [radarAnimating, setRadarAnimating] = useState(false)

      useEffect(() => {
        if (!mapInstance.current) {
          mapInstance.current = L.map(mapRef.current).setView([51.505, -0.09], 6)

          L.tileLayer(
            "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
            { attribution: "&copy; OpenStreetMap contributors" }
          ).addTo(mapInstance.current)

          radarLayer.current = L.tileLayer("", { opacity: 0.6 })
          radarLayer.current.addTo(mapInstance.current)

          loadLatestRadar()

          mapInstance.current.on("click", (e) => {
            if (cursorMode) {
              addMarker(e.latlng.lat, e.latlng.lng)
            }
          })
        }
      }, [])

      useEffect(() => {
        if (!radarLayer.current) return
        if (radarEnabled) {
          mapInstance.current.addLayer(radarLayer.current)
        } else {
          mapInstance.current.removeLayer(radarLayer.current)
        }
      }, [radarEnabled])

      async function loadLatestRadar() {
        const res = await fetch("https://api.rainviewer.com/public/weather-maps.json")
        const data = await res.json()
        const latest = data.radar.past[data.radar.past.length - 1]
        radarLayer.current.setUrl(
          `https://tilecache.rainviewer.com${latest.path}/256/{z}/{x}/{y}/2/1_1.png`
        )
      }

      async function playRadarAnimation() {
        try {
          setRadarAnimating(true)

          const res = await fetch("https://api.rainviewer.com/public/weather-maps.json")
          const data = await res.json()
          const frames = data.radar.past

          let index = 0

          const animate = () => {
            const frame = frames[index]
            radarLayer.current.setUrl(
              `https://tilecache.rainviewer.com${frame.path}/256/{z}/{x}/{y}/2/1_1.png`
            )

            index++

            if (index < frames.length) {
              radarAnimationRef.current = setTimeout(animate, 500)
            } else {
              const latest = frames[frames.length - 1]
              radarLayer.current.setUrl(
                `https://tilecache.rainviewer.com${latest.path}/256/{z}/{x}/{y}/2/1_1.png`
              )
              setRadarAnimating(false)
            }
          }

          animate()
        } catch (err) {
          console.error("Radar animation failed:", err)
          setRadarAnimating(false)
        }
      }

      function clearMarkers() {
        markersRef.current.forEach(marker => {
          mapInstance.current.removeLayer(marker)
        })
        markersRef.current = []
      }

      async function addMarker(lat, lng) {
        try {
          const marker = L.marker([lat, lng]).addTo(mapInstance.current)
          markersRef.current.push(marker)

          const res = await fetch(
            `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current_weather=true`
          )
          const data = await res.json()

          const current = data.current_weather

          setWeather({
            temp: current.temperature,
            wind: current.windspeed,
            rain: current.weathercode >= 51,
            lat: lat.toFixed(4),
            lng: lng.toFixed(4)
          })

          marker.bindPopup(
            `<b>${current.temperature}°C</b><br/>Wind: ${current.windspeed} km/h`
          ).openPopup()

        } catch {
          setLocationError("Failed to fetch weather data.")
        }
      }

      function showMyLocation() {
        setIsLoadingLocation(true)
        setLocationError(null)

        navigator.geolocation.getCurrentPosition(
          (position) => {
            const { latitude, longitude } = position.coords

            mapInstance.current.setView([latitude, longitude], 10)
            addMarker(latitude, longitude)

            setIsLoadingLocation(false)
          },
          () => {
            setLocationError("Location access denied.")
            setIsLoadingLocation(false)
          }
        )
      }

      return React.createElement(
        React.Fragment,
        null,

        React.createElement(
          "div",
          { style: { position: "absolute", top: "20px", left: "20px", zIndex: 1000, width: "320px" } },

          React.createElement(
            Card,
            null,

            React.createElement(
              CardHeader,
              null,
              React.createElement(CardTitle, null, "Weather Explorer"),
              React.createElement(CardDescription, null, "Click map or use location")
            ),

            React.createElement(
              CardContent,
              { className: "space-y-2" },

              React.createElement(
                Button,
                {
                  onClick: () => setCursorMode(!cursorMode),
                  className: "w-full"
                },
                React.createElement(Crosshair, { className: "h-4 w-4 mr-2" }),
                cursorMode ? "Cursor Marker: ON" : "Cursor Marker: OFF"
              ),

              React.createElement(
                Button,
                {
                  onClick: showMyLocation,
                  disabled: isLoadingLocation,
                  className: "w-full"
                },
                React.createElement(MapPin, { className: "h-4 w-4 mr-2" }),
                isLoadingLocation ? "Getting location..." : "Show My Location"
              ),

              React.createElement(
                Button,
                {
                  onClick: clearMarkers,
                  className: "w-full"
                },
                "Clear Markers"
              ),

              React.createElement(
                Button,
                {
                  onClick: () => setRadarEnabled(!radarEnabled),
                  className: "w-full"
                },
                radarEnabled ? "Radar: ON" : "Radar: OFF"
              ),

              React.createElement(
                Button,
                {
                  onClick: playRadarAnimation,
                  disabled: radarAnimating,
                  className: "w-full"
                },
                radarAnimating ? "Playing..." : "Play Radar"
              ),

              locationError &&
                React.createElement("div", null, locationError),

              weather &&
                React.createElement(
                  "div",
                  { className: "pt-2 border-t space-y-1" },
                  React.createElement("div", null, `Temperature: ${weather.temp}°C`),
                  React.createElement("div", null, `Wind: ${weather.wind} km/h`),
                  React.createElement("div", null, weather.rain ? "Raining" : "Clear"),
                  React.createElement("div", null, `Location: ${weather.lat}, ${weather.lng}`)
                )
            )
          )
        ),

        React.createElement("div", { id: "map", ref: mapRef })
      )
    }

    createRoot(document.getElementById("root")).render(
      React.createElement(App)
    )
  </script>
</body>
</html>
