<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Live Weather Map</title>

  <link
    rel="stylesheet"
    href="https://esm.sh/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    body {
      margin: 0;
      font-family: system-ui;
      background: #0f172a;
      color: white;
    }

    #map {
      height: 75vh;
    }

    .controls {
      padding: 10px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      background: #111827;
    }

    button {
      padding: 8px 14px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      background: #2563eb;
      color: white;
    }

    button:hover {
      opacity: 0.8;
    }

    .weather-card {
      padding: 15px;
      background: #1f2937;
    }
  </style>
</head>

<body>

<div id="map"></div>

<div class="controls">
  <button id="radarToggle">Radar ON</button>
  <button id="radarPlay">Play Radar</button>
</div>

<div class="weather-card" id="weatherInfo">
  Click on the map to view weather data.
</div>

<script type="module">
import L from "https://esm.sh/leaflet@1.9.4"

const map = L.map("map").setView([51.505, -0.09], 6)

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 19,
}).addTo(map)

let radarLayer = null
let radarFrames = []
let radarAnimationId = null
let radarIndex = 0
let radarEnabled = false
let radarAnimating = false

const FPS = 24
const FRAME_DELAY = 1000 / FPS

async function loadRadarFrames() {
  const response = await fetch(
    "https://api.rainviewer.com/public/weather-maps.json"
  )
  const data = await response.json()

  const past = data.radar.past || []
  const nowcast = data.radar.nowcast || []

  radarFrames = [...past, ...nowcast]
}

function toggleRadar() {
  radarEnabled = !radarEnabled

  if (radarEnabled) {
    if (!radarLayer && radarFrames.length) {
      const latest = radarFrames[radarFrames.length - 1]
      radarLayer = L.tileLayer(
        `https://tilecache.rainviewer.com${latest.path}/256/{z}/{x}/{y}/2/1_1.png`,
        { opacity: 0.6 }
      ).addTo(map)
    } else if (radarLayer) {
      radarLayer.addTo(map)
    }

    document.getElementById("radarToggle").textContent = "Radar OFF"
  } else {
    if (radarLayer) map.removeLayer(radarLayer)
    document.getElementById("radarToggle").textContent = "Radar ON"
  }
}

function playRadar() {
  if (!radarLayer || !radarFrames.length) return
  if (radarAnimating) return

  radarAnimating = true
  radarIndex = 0

  function animate() {
    if (!radarAnimating) return

    const frame = radarFrames[radarIndex]
    radarLayer.setUrl(
      `https://tilecache.rainviewer.com${frame.path}/256/{z}/{x}/{y}/2/1_1.png`
    )

    radarIndex = (radarIndex + 1) % radarFrames.length

    radarAnimationId = setTimeout(animate, FRAME_DELAY)
  }

  animate()
}

function stopRadar() {
  radarAnimating = false
  clearTimeout(radarAnimationId)

  if (radarFrames.length && radarLayer) {
    const latest = radarFrames[radarFrames.length - 1]
    radarLayer.setUrl(
      `https://tilecache.rainviewer.com${latest.path}/256/{z}/{x}/{y}/2/1_1.png`
    )
  }
}

document.getElementById("radarToggle").addEventListener("click", toggleRadar)

document.getElementById("radarPlay").addEventListener("click", () => {
  if (!radarAnimating) {
    playRadar()
    document.getElementById("radarPlay").textContent = "Stop Radar"
  } else {
    stopRadar()
    document.getElementById("radarPlay").textContent = "Play Radar"
  }
})

map.on("click", async (e) => {
  const { lat, lng } = e.latlng

  const response = await fetch(
    `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current_weather=true`
  )

  const data = await response.json()
  const weather = data.current_weather

  document.getElementById("weatherInfo").innerHTML = `
    <strong>Weather</strong><br>
    Temperature: ${weather.temperature}°C<br>
    Wind Speed: ${weather.windspeed} km/h
  `

  L.marker([lat, lng]).addTo(map)
})

await loadRadarFrames()

</script>
</body>
</html>
