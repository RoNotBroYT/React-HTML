<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Live Weather Map</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://esm.sh/leaflet@1.9.4/dist/leaflet.css" />
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@19.2.0",
        "react-dom/client": "https://esm.sh/react-dom@19.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@19.2.0/jsx-runtime",
        "lucide-react": "https://esm.sh/lucide-react",
        "@brrock/shad-pkged": "https://esm.sh/@brrock/shad-pkged@0.0.6?external=react,react-dom"
      }
    }
  </script>
  <style>
    body { margin: 0; font-family: system-ui; }
    #map { height: 100vh; width: 100%; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module">
    import React, { useEffect, useRef, useState } from "react"
    import { createRoot } from "react-dom/client"
    import L from "https://esm.sh/leaflet@1.9.4"
    import { CloudRain, Sun, Wind, MapPin, Crosshair, AlertCircle, Play, Pause } from "lucide-react"
    import {
      Button,
      Card,
      CardContent,
      CardDescription,
      CardHeader,
      CardTitle,
      Progress,
      Slider,
      SliderTrack,
      SliderRange,
      SliderThumb
    } from "@brrock/shad-pkged"

    function App() {
      const mapRef = useRef(null)
      const mapInstance = useRef(null)
      const radarLayer = useRef(null)
      const userMarker = useRef(null)
      const markersRef = useRef([])
      const radarAnimationRef = useRef(null)

      const [weather, setWeather] = useState(null)
      const [cursorMode, setCursorMode] = useState(true)
      const [isLoadingLocation, setIsLoadingLocation] = useState(false)
      const [locationError, setLocationError] = useState(null)
      const [radarEnabled, setRadarEnabled] = useState(true)
      const [radarAnimating, setRadarAnimating] = useState(false)
      const [radarPaused, setRadarPaused] = useState(false)
      const [radarFrame, setRadarFrame] = useState(0)
      const [timestamps, setTimestamps] = useState([])

      useEffect(() => {
        if (!mapInstance.current) {
          mapInstance.current = L.map(mapRef.current).setView([51.505, -0.09], 6)
          L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { attribution: "&copy; OpenStreetMap contributors" }).addTo(mapInstance.current)
          radarLayer.current = L.tileLayer("https://tilecache.rainviewer.com/v2/radar/latest/256/{z}/{x}/{y}/2/1_1.png", { opacity: 0.6 }).addTo(mapInstance.current)
          mapInstance.current.on("click", (e) => { if (cursorMode) addMarker(e.latlng.lat, e.latlng.lng) })
        }
      }, [cursorMode])

      useEffect(() => {
        if (radarLayer.current) {
          if (radarEnabled) mapInstance.current.addLayer(radarLayer.current)
          else mapInstance.current.removeLayer(radarLayer.current)
        }
      }, [radarEnabled])

      useEffect(() => {
        if (radarAnimating && !radarPaused && timestamps.length > 0) {
          radarAnimationRef.current = setTimeout(() => {
            const nextFrame = (radarFrame + 1) % timestamps.length
            if (radarLayer.current) radarLayer.current.setUrl(`https://tilecache.rainviewer.com/v2/radar/${timestamps[nextFrame]}/256/{z}/{x}/{y}/2/1_1.png`)
            setRadarFrame(nextFrame)
          }, 500)
        }
        return () => clearTimeout(radarAnimationRef.current)
      }, [radarFrame, radarAnimating, radarPaused, timestamps])

      function startRadarAnimation() {
        const now = Math.floor(Date.now() / 1000)
        const frames = []
        for (let i = 30; i >= 0; i -= 5) frames.push(now - i * 60)
        setTimestamps(frames)
        setRadarFrame(0)
        setRadarAnimating(true)
        setRadarPaused(false)
      }

      function pauseRadar() { setRadarPaused(true) }
      function resumeRadar() { setRadarPaused(false) }

      function clearMarkers() {
        markersRef.current.forEach(marker => mapInstance.current.removeLayer(marker))
        markersRef.current = []
      }

      async function addMarker(lat, lng) {
        try {
          const marker = L.marker([lat, lng]).addTo(mapInstance.current)
          markersRef.current.push(marker)
          const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current_weather=true`)
          if (!res.ok) throw new Error("Failed to fetch weather")
          const data = await res.json()
          const current = data.current_weather
          setWeather({ temp: current.temperature, wind: current.windspeed, rain: current.weathercode >= 51, lat: lat.toFixed(4), lng: lng.toFixed(4) })
          marker.bindPopup(`<b>${current.temperature}°C</b><br/>Wind: ${current.windspeed} km/h`).openPopup()
        } catch (err) {
          setLocationError("Failed to fetch weather data. Try again.")
        }
      }

      function showMyLocation() {
        setIsLoadingLocation(true)
        setLocationError(null)
        if (!navigator.geolocation) {
          setLocationError("Geolocation is not supported by your browser")
          setIsLoadingLocation(false)
          return
        }
        navigator.geolocation.getCurrentPosition(
          ({ coords: { latitude, longitude } }) => {
            if (userMarker.current) userMarker.current.setLatLng([latitude, longitude])
            else userMarker.current = L.marker([latitude, longitude], { title:"You are here", icon:L.icon({ iconUrl:"https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png", iconSize:[25,41], iconAnchor:[12,41], popupAnchor:[1,-34] }) }).addTo(mapInstance.current).bindPopup("<b>Your Location</b>").openPopup()
            mapInstance.current.setView([latitude, longitude], 10)
            addMarker(latitude, longitude)
            setIsLoadingLocation(false)
          },
          err => {
            let msg = "Could not get your location"
            if (err.code === 1) msg = "Permission denied. Please enable location access."
            else if (err.code === 2) msg = "Position unavailable. Try again."
            else if (err.code === 3) msg = "Location request timed out."
            setLocationError(msg)
            setIsLoadingLocation(false)
          }
        )
      }

      return React.createElement(
        React.Fragment,
        null,
        React.createElement("div", { style: { position:"absolute", top:"20px", left:"20px", zIndex:1000, width:"320px" } },
          React.createElement(Card, { className:"w-full" },
            React.createElement(CardHeader, null,
              React.createElement(CardTitle, null,"Weather Explorer"),
              React.createElement(CardDescription, null,"Click on map or use your location")
            ),
            React.createElement(CardContent, { className:"space-y-3" },
              React.createElement("div", { className:"space-y-2" },
                React.createElement(Button, { onClick:()=>setCursorMode(!cursorMode), variant: cursorMode?"default":"outline", className:"w-full" },
                  React.createElement(Crosshair, { className:"h-4 w-4 mr-2" }),
                  cursorMode ? "Cursor Marker: ON" : "Cursor Marker: OFF"
                ),
                React.createElement(Button, { onClick: showMyLocation, disabled:isLoadingLocation, variant:"secondary", className:"w-full" },
                  React.createElement(MapPin, { className:"h-4 w-4 mr-2" }),
                  isLoadingLocation ? "Getting location..." : "Show My Location"
                ),
                React.createElement(Button, { onClick: clearMarkers, variant:"destructive", className:"w-full text-xs" },"Clear Markers"),
                React.createElement(Button, { onClick:()=>setRadarEnabled(!radarEnabled), variant: radarEnabled?"default":"outline", className:"w-full text-xs" },
                  radarEnabled ? "Radar: ON" : "Radar: OFF"
                ),
                React.createElement(Button, { onClick:startRadarAnimation, disabled:radarAnimating, variant:"outline", className:"w-full text-xs" },
                  radarAnimating ? "Playing..." : "Play Radar"
                )
              ),
              locationError && React.createElement("div", { className:"flex items-center gap-2 p-2 bg-destructive/10 text-destructive text-sm rounded" },
                React.createElement(AlertCircle, { className:"h-4 w-4 flex-shrink-0" }),
                React.createElement("span", null, locationError)
              ),
              weather && React.createElement("div", { className:"space-y-2 pt-2 border-t" },
                React.createElement("div", { className:"flex items-center gap-2" },
                  weather.rain ? React.createElement(CloudRain,{className:"h-5 w-5 text-blue-500"}) : React.createElement(Sun,{className:"h-5 w-5 text-yellow-500"}),
                  React.createElement("span", { className:"text-sm" }, weather.rain?"Raining":"Clear")
                ),
                React.createElement("div",{className:"flex items-center gap-2"},
                  React.createElement(Wind,{className:"h-5 w-5 text-slate-500"}),
                  React.createElement("span",{className:"text-sm"},`Wind: ${weather.wind} km/h`)
                ),
                React.createElement("div",{className:"flex items-center gap-2"},
                  React.createElement(Sun,{className:"h-5 w-5 text-orange-500"}),
                  React.createElement("span",{className:"text-sm font-semibold"},`${weather.temp}°C`)
                ),
                React.createElement("div",{className:"text-xs text-muted-foreground pt-1"},`Location: ${weather.lat}, ${weather.lng}`)
              )
            )
          )
        ),
        React.createElement("div",{id:"map", ref:mapRef}),
        timestamps.length > 0 && React.createElement("div",{style:{position:"absolute", bottom:"20px", left:"50%", transform:"translateX(-50%)", width:"80%", zIndex:1000, background:"rgba(0,0,0,0.4)", padding:"10px", borderRadius:"8px", display:"flex", flexDirection:"column", gap:"6px"}},
          React.createElement(Progress,{value:radarFrame, max:timestamps.length}),
          React.createElement(Slider,{value:radarFrame, min:0, max:timestamps.length-1, onValueChange: v=> { setRadarFrame(v); if (radarLayer.current) radarLayer.current.setUrl(`https://tilecache.rainviewer.com/v2/radar/${timestamps[v]}/256/{z}/{x}/{y}/2/1_1.png`) } },
            React.createElement(SliderTrack,null,
              React.createElement(SliderRange,null)
            ),
            React.createElement(SliderThumb,null)
          ),
          React.createElement("div",{className:"flex gap-2 justify-center"},
            React.createElement(Button,{onClick:pauseRadar,variant:"outline",className:"flex-1 flex items-center justify-center"},
              React.createElement(Pause,{className:"h-4 w-4 mr-1"}),"Pause"
            ),
            React.createElement(Button,{onClick:resumeRadar,variant:"outline",className:"flex-1 flex items-center justify-center"},
              React.createElement(Play,{className:"h-4 w-4 mr-1"}),"Play"
            )
          )
        )
      )
    }

    createRoot(document.getElementById("root")).render(
      React.createElement(App)
    )
  </script>
</body>
</html>
